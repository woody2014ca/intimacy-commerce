# PostgreSQL for intimacy-commerce (local dev)
# Usage: docker compose up -d
version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: intimacy-commerce-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intimacy_commerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
